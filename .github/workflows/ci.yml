name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libjansson-dev libncurses-dev

      - name: Build
        run: |
          cc nob.c -o nob
          ./nob

      - name: Run tests
        run: bash tests/run_cli_tests.sh

  sanitize:
    name: Sanitizer tests (ASan + UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libjansson-dev libncurses-dev

      - name: Build and test with sanitizers
        env:
          DISPATCH_TEST_BUILD_MODE: asan
          ASAN_OPTIONS: halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          cc nob.c -o nob
          bash tests/run_cli_tests.sh

  werror:
    name: Warnings as errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libjansson-dev libncurses-dev

      - name: Build with -Werror
        run: |
          cc nob.c -o nob
          ./nob werror
